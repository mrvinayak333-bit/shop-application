<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - SHREE RAAM MOBAILE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand"><span style="font-size:1.6rem;">📱</span> SHREE RAAM MOBAILE</a>
    <a href="/" class="btn btn-sm btn-outline-primary">← Home</a>
  </nav>

  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <span class="role-badge bg-admin">Admin</span>
          <h3>Admin Login</h3>
          <p>Manage repairs, customers, and technicians</p>
        </div>
        <div class="login-slider" id="loginSlider"></div>
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" id="email" placeholder="Enter email" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
          </div>
          <div id="loginError"></div>
          <button type="submit" class="btn btn-success btn-block">🔑 Admin Login</button>
        </form>
      </div>
      <div class="back-link"><a href="/">← Back to Home</a></div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Gallery.initSlider(document.getElementById('loginSlider'), 'admin_login');
    });
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await Auth.login(document.getElementById('email').value, document.getElementById('password').value, 'admin');
      if (res.success) window.location.href = '/dashboard/admin';
      else document.getElementById('loginError').innerHTML = `<div class="alert alert-danger">${res.message}</div>`;
    });
  </script>
</body>
</html>
