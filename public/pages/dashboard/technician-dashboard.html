<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technician Panel - SHREE RAAM MOBAILE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand"><span style="font-size:1.6rem;">📱</span> SHREE RAAM MOBAILE</a>
  <div class="navbar-menu">
    <span id="userName" style="margin-right:1rem;"></span>
    <button class="btn btn-sm btn-outline-danger" onclick="Auth.logout()">Logout</button>
  </div>
</nav>

<div class="main-content" id="mainContent" style="max-width:1200px;margin:0 auto;"><div class="spinner"></div></div>

<script src="/js/main.js"></script>
<script>
const user = API.getUser();
if (!user || user.role !== 'technician') window.location.href = '/login/technician';
document.getElementById('userName').textContent = '🛠️ ' + user.name;

let currentView = 'dashboard';

async function loadDashboard() {
  const c = document.getElementById('mainContent');
  const res = await API.get('/technician/dashboard');
  if (!res.success) { c.innerHTML = '<p>Error</p>'; return; }
  const tech = res.tech, stats = res.stats;

  c.innerHTML = `
    <h4 style="color:var(--primary-dark);">🛠️ Welcome, ${tech.name}!</h4>
    <p style="color:var(--secondary);">${tech.specialization||'Technician'} | ⭐ ${tech.rating||0} | Commission: ${tech.commission_percent||0}%</p>
    <div class="dashboard-stats">
      <div class="stat-card"><div class="stat-icon" style="background:var(--gradient-4);">⏳</div><div class="stat-info"><h4>${stats.activeJobs}</h4><p>Active Jobs</p></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--gradient-3);">✅</div><div class="stat-info"><h4>${stats.completedJobs}</h4><p>Completed</p></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--gradient-2);">💰</div><div class="stat-info"><h4>${UI.formatCurrency(stats.commissionEarned)}</h4><p>Commission</p></div></div>
    </div>
    <h5>🔧 My Repair Jobs</h5>
    <div class="card"><div class="card-body" style="overflow-x:auto">
    ${res.jobs?.length === 0 ? '<p>No active jobs assigned.</p>' : ''}
    <table class="table"><thead><tr><th>Tracking</th><th>Device</th><th>Customer</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
    <tbody>${res.jobs?.map(j => `
      <tr>
        <td><strong>${j.tracking_number}</strong></td>
        <td>${j.device_type} ${j.brand} ${j.model||''}</td>
        <td>${j.customer_name}</td>
        <td>${UI.getStatusBadge(j.status)}</td>
        <td>${UI.formatDate(j.created_at)}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="showQuotation(${j.id},'${j.tracking_number}','${j.device_type} ${j.brand}')">💰 Quote</button>
          <button class="btn btn-sm btn-info" onclick="updateStatus(${j.id}, 'under_diagnosis')">🔍 Diagnose</button>
          <button class="btn btn-sm btn-success" onclick="updateStatus(${j.id}, 'repair_done')">✅ Done</button>
        </td>
      </tr>`).join('')}</tbody></table></div></div>
  `;
}

window.showQuotation = async function(repairId, tracking, device) {
  const c = document.getElementById('mainContent');
  c.innerHTML = `
    <button class="btn btn-sm btn-outline-primary mb-3" onclick="loadDashboard()">← Back to Jobs</button>
    <h4 style="color:var(--primary-dark);">💰 Create Quotation</h4>
    <p><strong>${tracking}</strong> - ${device}</p>
    <div class="card"><div class="card-body">
      <form id="quoteForm">
        <div class="form-group"><label>Diagnosis Notes *</label><textarea class="form-control" id="qDiagnosis" rows="2" placeholder="Describe the problem found..." required></textarea></div>
        <div class="form-group"><label>Spare Parts Used</label><textarea class="form-control" id="qParts" rows="2" placeholder="List parts with prices, e.g.: Screen - ₹800, Battery - ₹500"></textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group"><label>Parts Cost (₹)</label><input type="number" class="form-control" id="qPartsCost" value="0" step="0.01"></div>
          <div class="form-group"><label>Labor Cost (₹) *</label><input type="number" class="form-control" id="qLaborCost" value="0" step="0.01" required></div>
          <div class="form-group"><label>Estimated Days</label><input type="number" class="form-control" id="qDays" value="3"></div>
          <div class="form-group" style="align-self:end;"><strong id="qTotal" style="font-size:1.3rem;color:var(--primary-dark);">Total: ₹0.00</strong></div>
        </div>
        <button type="submit" class="btn btn-success btn-block" style="font-size:1.1rem;">📋 Generate Quotation & Send to Customer</button>
      </form></div></div>
    <div id="quoteResult" class="mt-3"></div>
  `;

  const updateTotal = () => {
    const parts = parseFloat(document.getElementById('qPartsCost').value)||0;
    const labor = parseFloat(document.getElementById('qLaborCost').value)||0;
    document.getElementById('qTotal').textContent = 'Total: ₹' + (parts + labor).toLocaleString('en-IN');
  };
  document.getElementById('qPartsCost').addEventListener('input', updateTotal);
  document.getElementById('qLaborCost').addEventListener('input', updateTotal);

  document.getElementById('quoteForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = await API.post('/technician/repair/' + repairId + '/quotation', {
      diagnosis: document.getElementById('qDiagnosis').value,
      spare_parts: document.getElementById('qParts').value,
      parts_cost: parseFloat(document.getElementById('qPartsCost').value)||0,
      labor_cost: parseFloat(document.getElementById('qLaborCost').value)||0,
      estimated_days: parseInt(document.getElementById('qDays').value)||3
    });
    if (res.success) {
      document.getElementById('quoteResult').innerHTML = `<div class="alert alert-success"><h5>✅ Quotation Generated!</h5><p>Total: ₹${res.total}. Customer will be notified for approval.</p><button class="btn btn-primary mt-2" onclick="loadDashboard()">Back to Dashboard</button></div>`;
    } else UI.showToast(res.message, 'error');
  });
};

window.updateStatus = async function(repairId, status) {
  if (!confirm('Update status to ' + status.replace(/_/g,' ') + '?')) return;
  const notes = prompt('Add notes (optional):');
  const res = await API.put('/technician/repair/' + repairId + '/status', { status, notes });
  if (res.success) { UI.showToast('Status updated!', 'success'); loadDashboard(); }
  else UI.showToast(res.message, 'error');
};

loadDashboard();
</script>
</body>
</html>
