<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login - SHREE RAAM MOBAILE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand"><span style="font-size:1.6rem;">📱</span> SHREE RAAM MOBAILE</a>
    <a href="/" class="btn btn-sm btn-outline-primary">← Home</a>
  </nav>

  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <span class="role-badge bg-student">Student</span>
          <h3>Student Login</h3>
          <p>Access your courses and certificates</p>
        </div>
        <div class="login-slider" id="loginSlider"></div>
        <form id="loginForm">
          <div class="form-group">
            <label>Student ID</label>
            <input type="text" class="form-control" id="studentId" placeholder="Enter your Student ID" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
          </div>
          <div id="loginError"></div>
          <button type="submit" class="btn btn-success btn-block">🎓 Login as Student</button>
        </form>
      </div>
      <div class="back-link"><a href="/">← Back to Home</a></div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Gallery.initSlider(document.getElementById('loginSlider'), 'student_login');
    });
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const studentId = document.getElementById('studentId').value;
      const password = document.getElementById('password').value;
      const res = await Auth.login(null, password, 'student', studentId);
      if (res.success) window.location.href = '/dashboard/student';
      else document.getElementById('loginError').innerHTML = `<div class="alert alert-danger">${res.message}</div>`;
    });
  </script>
</body>
</html>
