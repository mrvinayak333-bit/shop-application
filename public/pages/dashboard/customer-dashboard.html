<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard - SHREE RAAM MOBAILE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand"><span style="font-size:1.6rem;">📱</span> SHREE RAAM MOBAILE</a>
  <div class="navbar-menu">
    <span id="userName" style="margin-right:1rem;"></span>
    <button class="btn btn-sm btn-outline-danger" onclick="Auth.logout()">Logout</button>
  </div>
</nav>

<div class="dashboard">
  <aside class="sidebar">
    <div class="sidebar-header">Customer Menu</div>
    <ul class="sidebar-menu" id="sidebarMenu">
      <li><a href="#" data-page="dashboard" class="active">📊 Dashboard</a></li>
      <li><a href="#" data-page="newRepair">🔧 New Repair</a></li>
      <li><a href="#" data-page="myRepairs">📋 My Repairs</a></li>
      <li><a href="#" data-page="trackRepair">📍 Live Tracking</a></li>
      <li><a href="#" data-page="invoices">💰 My Invoices</a></li>
      <li><a href="#" data-page="profile">👤 Profile</a></li>
    </ul>
  </aside>
  <main class="main-content" id="mainContent"><div class="spinner"></div></main>
</div>

<script src="/js/main.js"></script>
<script>
const user = API.getUser();
if (!user || user.role !== 'customer') window.location.href = '/login/customer';
document.getElementById('userName').textContent = '👤 ' + user.name;

document.getElementById('sidebarMenu').addEventListener('click', (e) => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  document.querySelectorAll('#sidebarMenu a').forEach(a => a.classList.remove('active'));
  link.classList.add('active');
  loadPage(link.dataset.page);
});

async function loadPage(page) {
  const c = document.getElementById('mainContent');
  UI.showLoading(c);

  switch(page) {
    case 'dashboard': {
      const res = await API.get('/customer/dashboard');
      if (!res.success) { c.innerHTML = '<p>Error</p>'; return; }
      c.innerHTML = `
        <h4>Welcome, ${res.customer.name}! 👋</h4>
        <div class="dashboard-stats">
          <div class="stat-card"><div class="stat-icon" style="background:var(--gradient-4);">⏳</div><div class="stat-info"><h4>${res.activeRepairs?.length||0}</h4><p>Active Repairs</p></div></div>
          <div class="stat-card"><div class="stat-icon" style="background:var(--gradient-3);">✅</div><div class="stat-info"><h4>${res.customer.total_repairs}</h4><p>Total Repairs</p></div></div>
        </div>
        <h5>🔧 Active Repairs</h5>
        ${res.activeRepairs?.length === 0 ? '<p>No active repairs.</p>' : ''}
        ${res.activeRepairs?.map(r => `
          <div class="card mb-2"><div class="card-body">
            <strong>${r.tracking_number}</strong> - ${r.device_type} ${r.brand} ${r.model||''}<br>
            Status: ${UI.getStatusBadge(r.status)} | Tech: ${r.tech_name||'Pending'} | ${UI.formatDate(r.created_at)}
          </div></div>`).join('')}
        <h5 class="mt-3">📋 Recent History</h5>
        ${res.repairHistory?.length === 0 ? '<p>No repair history.</p>' : ''}
        ${res.repairHistory?.map(r => `
          <div class="card mb-2"><div class="card-body">
            <strong>${r.tracking_number}</strong> - ${r.device_type} ${r.brand} | ${UI.getStatusBadge(r.status)} | ${UI.formatDate(r.created_at)}
          </div></div>`).join('')}
      `;
      break;
    }
    case 'newRepair':
      c.innerHTML = `
        <h4 style="color:var(--primary-dark);">🔧 Register New Repair</h4>
        <div class="card"><div class="card-body">
          <form id="repairForm">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
              <div class="form-group"><label>First Name *</label><input class="form-control" id="rFirstName" value="${user.name?.split(' ')[0]||''}" required></div>
              <div class="form-group"><label>Last Name *</label><input class="form-control" id="rLastName" value="${user.name?.split(' ').slice(1).join(' ')||''}" required></div>
              <div class="form-group"><label>Mobile Number *</label><input type="tel" class="form-control" id="rMobile" value="${user.mobile||''}" required></div>
              <div class="form-group"><label>Address</label><input class="form-control" id="rAddress" value="${user.address||''}"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
              <div class="form-group"><label>Mobile Brand *</label>
                <select class="form-control" id="rBrand" required>
                  <option value="">-- Select Brand --</option>
                  <option>Oppo</option><option>Vivo</option><option>Samsung</option><option>Xiaomi</option>
                  <option>Redmi</option><option>Realme</option><option>OnePlus</option><option>iPhone</option>
                  <option>Motorola</option><option>Nokia</option><option>Lava</option><option>Other</option>
                </select>
              </div>
              <div class="form-group"><label>Model Number *</label><input class="form-control" id="rModel" placeholder="e.g., Galaxy S23" required></div>
              <div class="form-group"><label>IMEI Number</label><input class="form-control" id="rImei" placeholder="15-digit IMEI number"></div>
              <div class="form-group"><label>Device Type</label><select class="form-control" id="rDeviceType"><option>Smartphone</option><option>Tablet</option><option>Feature Phone</option></select></div>
            </div>
            <div class="form-group"><label>Device Condition (Select all that apply)</label>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.5rem;padding:0.5rem 0;">
                ${['Dead','ON Condition','Physical Damage','Water Damage','Display Broken','Battery Issue','Back Glass Broken','Speaker Issue','Mic Issue','Charging Issue','Camera Issue','Software Issue','Network Issue','Heating Issue'].map(c => `
                  <label style="display:flex;align-items:center;gap:0.5rem;font-weight:400;cursor:pointer;padding:0.4rem 0.6rem;border:1px solid var(--border);border-radius:8px;">
                    <input type="checkbox" name="rCondition" value="${c}" style="accent-color:var(--primary);"> ${c}
                  </label>`).join('')}
              </div>
            </div>
            <div class="form-group"><label>Problem Description *</label><textarea class="form-control" id="rIssue" rows="3" placeholder="Describe the problem in detail..." required></textarea></div>
            <div class="form-group"><label>Upload Device Photo</label><input type="file" class="form-control" id="rPhoto" accept="image/*" style="padding:0.5rem;"></div>
            <button type="submit" class="btn btn-success btn-block" style="font-size:1.1rem;padding:0.9rem;">📝 Submit Repair Request</button>
          </form></div></div>
      `;
      document.getElementById('repairForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const conditions = Array.from(document.querySelectorAll('input[name="rCondition"]:checked')).map(cb => cb.value).join(', ');
        const formData = {
          device_type: document.getElementById('rDeviceType').value,
          brand: document.getElementById('rBrand').value,
          model: document.getElementById('rModel').value,
          imei: document.getElementById('rImei').value,
          issue_description: document.getElementById('rIssue').value,
          device_condition_multi: conditions,
          first_name: document.getElementById('rFirstName').value,
          last_name: document.getElementById('rLastName').value,
          customer_mobile: document.getElementById('rMobile').value,
          customer_address: document.getElementById('rAddress').value
        };
        const res = await API.post('/repair', formData);
        if (res.success) {
          // Show popup
          const popup = document.createElement('div');
          popup.className = 'popup-overlay show';
          popup.innerHTML = `
            <div class="popup" style="text-align:center;">
              <div class="popup-icon">✅</div>
              <h3 style="color:var(--primary-dark);">Your Submitted Successfully!</h3>
              <p><strong>Tracking Number:</strong> <span style="font-size:1.5rem;color:var(--primary);">${res.repair.tracking_number}</span></p>
              ${res.repair.qr_code ? `<img src="${res.repair.qr_code}" alt="QR" style="max-width:180px;margin:0.5rem;">` : ''}
              <p style="color:var(--secondary);font-size:0.85rem;">Save this number to track your repair status.</p>
            </div>`;
          document.body.appendChild(popup);
          setTimeout(() => { popup.remove(); loadPage('myRepairs'); }, 4000);
        } else UI.showToast(res.message, 'error');
      });
      break;

    case 'myRepairs': {
      const res = await API.get('/customer/dashboard');
      c.innerHTML = `
        <h4>📋 My Repairs</h4>
        <h5>Active Repairs</h5>
        ${res.activeRepairs?.length === 0 ? '<p>No active repairs.</p>' : res.activeRepairs.map(r => `
          <div class="card mb-2"><div class="card-body">
            <strong>${r.tracking_number}</strong> - ${r.device_type} ${r.brand} ${r.model||''}<br>
            Status: ${UI.getStatusBadge(r.status)} | Tech: ${r.tech_name||'Pending'} | ${UI.formatDate(r.created_at)}
          </div></div>`).join('')}
        <h5 class="mt-3">History</h5>
        ${res.repairHistory?.map(r => `<div class="card mb-2"><div class="card-body"><strong>${r.tracking_number}</strong> - ${r.device_type} ${r.brand} | ${UI.getStatusBadge(r.status)} | ${UI.formatDate(r.created_at)}</div></div>`).join('')}
      `;
      break;
    }
    case 'invoices': {
      const res = await API.get('/payment/my-invoices');
      c.innerHTML = `<h4>💰 My Invoices</h4>
        ${res.invoices?.length === 0 ? '<p>No invoices yet.</p>' : ''}
        <div class="card"><div class="card-body" style="overflow-x:auto"><table class="table"><thead><tr><th>Invoice #</th><th>Total</th><th>Paid</th><th>Balance</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${res.invoices?.map(i => `<tr><td>${i.invoice_number}</td><td>${UI.formatCurrency(i.total_amount)}</td><td>${UI.formatCurrency(i.paid_amount)}</td><td>${UI.formatCurrency(i.balance_amount)}</td><td>${UI.getStatusBadge(i.payment_status)}</td><td>${UI.formatDate(i.invoice_date)}</td></tr>`).join('')}</tbody></table></div></div>`;
      break;
    }
    case 'profile': {
      const res = await API.get('/customer/profile');
      c.innerHTML = `
        <h4>👤 My Profile</h4>
        <div class="card"><div class="card-body">
          <form id="profileForm">
            <div class="form-group"><label>Name</label><input class="form-control" id="pName" value="${res.customer.name||''}"></div>
            <div class="form-group"><label>Email</label><input type="email" class="form-control" id="pEmail" value="${res.customer.email||''}"></div>
            <div class="form-group"><label>Mobile</label><input class="form-control" id="pMobile" value="${res.customer.mobile||''}" disabled></div>
            <div class="form-group"><label>Address</label><input class="form-control" id="pAddress" value="${res.customer.address||''}"></div>
            <div class="form-group"><label>City</label><input class="form-control" id="pCity" value="${res.customer.city||''}"></div>
            <button type="submit" class="btn btn-primary">Update Profile</button>
          </form></div></div>
      `;
      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await API.put('/customer/profile', {
          name: document.getElementById('pName').value,
          email: document.getElementById('pEmail').value,
          address: document.getElementById('pAddress').value,
          city: document.getElementById('pCity').value
        });
        if (res.success) UI.showToast('Profile updated', 'success');
        else UI.showToast(res.message, 'error');
      });
      break;
    }

    case 'trackRepair':
      c.innerHTML = `
        <h4 style="color:var(--primary-dark);">📍 Live Repair Tracking</h4>
        <div class="card"><div class="card-body">
          <div class="input-group mb-3">
            <input type="text" class="form-control" id="trackInput" placeholder="Enter Tracking Number (e.g., SRM-2026-000001)">
            <button class="btn btn-primary" onclick="window.trackMyRepair()">🔍 Track</button>
          </div>
          <div id="trackDetail"></div>
        </div></div>
      `;
      window.trackMyRepair = async function() {
        const tn = document.getElementById('trackInput').value.trim();
        if (!tn) { UI.showToast('Enter tracking number', 'error'); return; }
        const res = await API.get('/repair/customer/' + tn);
        if (!res.success || !res.repair) { document.getElementById('trackDetail').innerHTML = '<div class="alert alert-danger">Tracking number not found</div>'; return; }
        const r = res.repair;
        const allStatuses = [
          { key:'registered', label:'1. Pickup Successful', icon:'📦' },
          { key:'pickup_done', label:'2. Admin Verification', icon:'✅' },
          { key:'admin_verified', label:'3. Device Received at Service Centre', icon:'🏢' },
          { key:'received_center', label:'4. Under Diagnosis', icon:'🔍' },
          { key:'under_diagnosis', label:'5. Under Repair', icon:'🔧' },
          { key:'under_repair', label:'6. Waiting for Spare Parts', icon:'⏳' },
          { key:'waiting_parts', label:'7. Repair Completed', icon:'✔️' },
          { key:'repair_done', label:'8. Quality Testing', icon:'🧪' },
          { key:'quality_test', label:'9. Ready for Delivery', icon:'📤' },
          { key:'ready_delivery', label:'10. Out for Delivery', icon:'🚚' },
          { key:'out_delivery', label:'11. Delivered Successfully', icon:'🎉' },
          { key:'delivered', label:'11. Delivered Successfully', icon:'🎉' }
        ];
        const currentIdx = allStatuses.findIndex(s => s.key === r.status);
        document.getElementById('trackDetail').innerHTML = `
          <div class="card"><div class="card-body">
            <h5>📋 Tracking: <strong style="color:var(--primary);">${r.tracking_number}</strong></h5>
            <p><strong>Device:</strong> ${r.device_type} - ${r.brand} ${r.model||''}</p>
            <p><strong>Status:</strong> ${UI.getStatusBadge(r.status)}</p>
            <div style="position:relative;padding:1rem 0;">
              ${allStatuses.map((s,i) => `
                <div style="display:flex;align-items:center;gap:1rem;padding:0.5rem 0;">
                  <div style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;
                    background:${i<=currentIdx?'var(--primary)':'#e9ecef'};color:${i<=currentIdx?'white':'#999'};flex-shrink:0;transition:all 0.3s;">
                    ${i<=currentIdx?s.icon:'○'}
                  </div>
                  <div style="flex:1;">
                    <div style="font-weight:${i===currentIdx?'700':'400'};color:${i<=currentIdx?'var(--primary-dark)':'#999'};">${s.label}</div>
                    ${i===currentIdx?'<small style="color:var(--primary);">⏺ Current Status</small>':''}
                  </div>
                  ${i<allStatuses.length-1?`<div style="position:absolute;left:19px;top:${45+i*52}px;width:2px;height:30px;background:${i<currentIdx?'var(--primary)':'#e9ecef'};"></div>`:''}
                </div>`).join('')}
            </div>
            ${res.quotation ? `<div class="alert alert-info mt-2"><strong>💰 Quotation:</strong> ₹${res.quotation.total_cost} | <strong>Status:</strong> ${res.quotation.status}</div>` : ''}
          </div></div>
        `;
      };
      break;

  }
}

loadPage('dashboard');
</script>
</body>
</html>
