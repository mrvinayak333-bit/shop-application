<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - SHREE RAAM MOBAILE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand"><span style="font-size:1.6rem;">📱</span> SHREE RAAM MOBAILE</a>
  <div class="navbar-menu">
    <span id="userName" style="margin-right:1rem;"></span>
    <button class="btn btn-sm btn-outline-danger" onclick="Auth.logout()">Logout</button>
  </div>
</nav>

<div class="dashboard">
  <aside class="sidebar">
    <div class="sidebar-header">Student Menu</div>
    <ul class="sidebar-menu" id="sidebarMenu">
      <li><a href="#" data-page="dashboard" class="active">📊 Dashboard</a></li>
      <li><a href="#" data-page="courses">📚 My Courses</a></li>
      <li><a href="#" data-page="certificates">📜 My Certificates</a></li>
    </ul>
  </aside>

  <main class="main-content" id="mainContent"><div class="spinner"></div></main>
</div>

<script src="/js/main.js"></script>
<script>
const user = API.getUser();
if (!user || user.role !== 'student') window.location.href = '/login/student';
document.getElementById('userName').textContent = '🎓 ' + user.name + ' (' + (user.studentId || 'N/A') + ')';

let currentPage = 'dashboard';

document.getElementById('sidebarMenu').addEventListener('click', (e) => {
  const link = e.target.closest('a');
  if (!link) return;
  e.preventDefault();
  document.querySelectorAll('#sidebarMenu a').forEach(a => a.classList.remove('active'));
  link.classList.add('active');
  currentPage = link.dataset.page;
  loadPage(currentPage);
});

async function loadPage(page) {
  const content = document.getElementById('mainContent');
  UI.showLoading(content);

  if (page === 'dashboard') {
    const res = await API.get('/student/dashboard');
    if (!res.success) { content.innerHTML = '<p>Error loading dashboard</p>'; return; }
    const s = res.student;
    content.innerHTML = `
      <h4>Welcome, ${s.name}! 🎓</h4>
      <p style="color:var(--secondary)">Student ID: <strong>${s.student_id}</strong> | Course: ${s.course || 'Not assigned'} | Batch: ${s.batch || 'N/A'}</p>

      <h5 class="mt-3">📚 Enrolled Courses</h5>
      <div class="course-grid">
        ${res.courses.length === 0 ? '<p>No courses assigned yet.</p>' : ''}
        ${res.courses?.map(c => `
          <div class="course-card" onclick="viewCourse(${c.course_id})" style="cursor:pointer;">
            <div class="course-card-header" style="background:var(--gradient-${['2','3','1'][Math.floor(Math.random()*3)]});">
              <h5>${c.course_name}</h5><small>${c.course_code||''}</small>
            </div>
            <div class="course-card-body">
              <p>${c.description||''}</p>
              <p><strong>Duration:</strong> ${c.duration||'N/A'}</p>
              <span class="badge badge-${c.enrollment_status==='completed'?'active':'info'}">${c.enrollment_status}</span>
            </div>
          </div>`).join('')}
      </div>

      <h5 class="mt-3">📜 My Certificates</h5>
      ${res.certificates?.length === 0 ? '<p>No certificates yet.</p>' : ''}
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem">
        ${res.certificates?.map(c => `
          <div class="card" style="text-align:center;padding:1.5rem;">
            <div style="font-size:2rem;">🏆</div>
            <strong>${c.title}</strong>
            <p style="font-size:0.8rem;color:var(--secondary)">${c.issue_date||''}</p>
            <a href="${c.file_path}" target="_blank" class="btn btn-sm btn-success">📥 Download</a>
          </div>`).join('')}
      </div>
    `;
  } else if (page === 'courses') {
    const res = await API.get('/student/dashboard');
    if (!res.success) { content.innerHTML = '<p>Error</p>'; return; }
    content.innerHTML = `
      <h4>📚 My Courses</h4>
      <div class="course-grid">
        ${res.courses?.length === 0 ? '<p>No courses assigned yet.</p>' : ''}
        ${res.courses?.map(c => `
          <div class="course-card" onclick="viewCourse(${c.course_id})" style="cursor:pointer;">
            <div class="course-card-header" style="background:var(--gradient-2);"><h5>${c.course_name}</h5><small>${c.course_code||''}</small></div>
            <div class="course-card-body"><p>${c.description||''}</p><button class="btn btn-sm btn-primary">View Course →</button></div>
          </div>`).join('')}
      </div>
    `;
  } else if (page === 'certificates') {
    const res = await API.get('/student/certificates');
    content.innerHTML = `
      <h4>📜 My Certificates</h4>
      ${res.certificates?.length === 0 ? '<p>No certificates yet.</p>' : ''}
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem">
        ${res.certificates?.map(c => `
          <div class="card" style="text-align:center;padding:1.5rem;">
            <div style="font-size:3rem;">🏆</div>
            <h5>${c.title}</h5>
            <p style="font-size:0.85rem;color:var(--secondary)">Issued: ${c.issue_date||'N/A'}</p>
            <a href="${c.file_path}" target="_blank" class="btn btn-success btn-block">📥 Download ${c.certificate_type.toUpperCase()}</a>
          </div>`).join('')}
      </div>
    `;
  }
}

async function viewCourse(courseId) {
  const content = document.getElementById('mainContent');
  UI.showLoading(content);
  const res = await API.get(`/student/course/${courseId}`);
  if (!res.success) { content.innerHTML = '<p>Error loading course</p>'; return; }

  function getYouTubeEmbed(url) {
    const match = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|v\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return match ? `https://www.youtube.com/embed/${match[1]}` : '';
  }

  content.innerHTML = `
    <button class="btn btn-sm btn-outline-primary mb-3" onclick="loadPage('courses')">← Back to Courses</button>
    <h4>${res.course.course_name}</h4>
    <p style="color:var(--secondary)">${res.course.description||''} | Duration: ${res.course.duration||'N/A'}</p>

    <h5 class="mt-3">🎬 Video Lectures</h5>
    ${res.videos?.length === 0 ? '<p>No videos yet.</p>' : ''}
    ${res.videos?.map(v => `
      <div class="card mb-3">
        <div class="card-body">
          <h6>${v.title}</h6>
          ${getYouTubeEmbed(v.video_url) ? `
            <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;margin-bottom:0.5rem;">
              <iframe src="${getYouTubeEmbed(v.video_url)}" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe>
            </div>` : `<a href="${v.video_url}" target="_blank" class="btn btn-sm btn-danger">▶ Watch on YouTube</a>`}
          ${v.description ? `<p style="font-size:0.85rem;color:var(--secondary);margin-top:0.5rem;">${v.description}</p>` : ''}
        </div>
      </div>`).join('')}

    <h5 class="mt-3">📄 Course Materials</h5>
    ${res.materials?.length === 0 ? '<p>No materials yet.</p>' : ''}
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem">
      ${res.materials?.map(m => `
        <div class="card" style="text-align:center;padding:1rem;">
          <div style="font-size:2rem;">${m.file_type==='pdf'?'📕':m.file_type==='image'?'🖼️':'📎'}</div>
          <strong style="font-size:0.85rem;">${m.title}</strong>
          <p style="font-size:0.75rem;color:var(--secondary)">${m.description||''}</p>
          <a href="${m.file_path}" target="_blank" class="btn btn-sm btn-info">📥 Download</a>
        </div>`).join('')}
    </div>
  `;
}

loadPage('dashboard');
</script>
</body>
</html>
